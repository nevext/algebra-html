<svg viewBox="0 0 800 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Papel de caderno -->
  <rect width="800" height="1000" fill="#fef9f3" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Linhas horizontal do caderno -->
  <g stroke="#e8d4c4" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="450" x2="800" y2="450"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="0" y1="550" x2="800" y2="550"/>
    <line x1="0" y1="600" x2="800" y2="600"/>
    <line x1="0" y1="650" x2="800" y2="650"/>
    <line x1="0" y1="700" x2="800" y2="700"/>
    <line x1="0" y1="750" x2="800" y2="750"/>
    <line x1="0" y1="800" x2="800" y2="800"/>
    <line x1="0" y1="850" x2="800" y2="850"/>
    <line x1="0" y1="900" x2="800" y2="900"/>
  </g>
  
  <!-- Margem vermelha -->
  <line x1="70" y1="0" x2="70" y2="1000" stroke="#d32f2f" stroke-width="2"/>
  
  <!-- Conteúdo escrito -->
  <text x="100" y="60" font-family="cursive" font-size="24" font-weight="bold" fill="#333">Cálculo à mão - Página 1</text>
  
  <text x="100" y="140" font-family="monospace" font-size="14" fill="#555">1) Índice de Mogno:</text>
  <text x="120" y="175" font-family="monospace" font-size="13" fill="#555">indice_mogno = 31 + 52 + 43</text>
  <text x="140" y="205" font-family="monospace" font-size="13" fill="#555">=  3 + 10 + 12 = 25</text>
  
  <text x="100" y="280" font-family="monospace" font-size="14" fill="#555">2) Índice de Cerejeira:</text>
  <text x="120" y="315" font-family="monospace" font-size="13" fill="#555">indice_cerejeira = 41 + 32 + 53</text>
  <text x="140" y="345" font-family="monospace" font-size="13" fill="#555">=  4 + 6 + 15 = 25</text>
  
  <text x="100" y="420" font-family="monospace" font-size="14" fill="#555">3) Soma dos Índices:</text>
  <text x="120" y="455" font-family="monospace" font-size="13" fill="#555">soma = 25 + 25 = 50</text>
  
  <text x="100" y="530" font-family="monospace" font-size="14" fill="#555">4) Fechamento Mogno:</text>
  <text x="120" y="565" font-family="monospace" font-size="13" fill="#555">fech_mogno = 10 + 8 + 4 = 22</text>
  
  <text x="100" y="640" font-family="monospace" font-size="14" fill="#555">5) Fechamento Cerejeira:</text>
  <text x="120" y="675" font-family="monospace" font-size="13" fill="#555">fech_cerejeira = 12 + 8 + 6 = 26</text>
  
  <text x="100" y="750" font-family="monospace" font-size="14" fill="#555">6) Fechamento Total:</text>
  <text x="120" y="785" font-family="monospace" font-size="13" fill="#555">fech_total = 22 + 26 = 48</text>
  
  <text x="100" y="860" font-family="monospace" font-size="12" fill="#888" font-style="italic">Continua na página 2...</text>
</svg>
