  </g>
  <line x1="70" y1="0" x2="70" y2="1000" stroke="#d32f2f" stroke-width="2"/>
  <text x="100" y="60" font-family="cursive" font-size="24" font-weight="bold" fill="#333">Cálculo à mão - Página 2</text>
  <text x="100" y="140" font-family="monospace" font-size="14" fill="#555">7) Montagem da matriz A7:</text>
  <text x="120" y="175" font-family="monospace" font-size="13" fill="#555">[25, 25, 50]</text>
  <text x="120" y="195" font-family="monospace" font-size="13" fill="#555">[22, 26, 48]</text>
  <text x="120" y="215" font-family="monospace" font-size="13" fill="#555">[1, 2, 3]</text>
  <text x="100" y="280" font-family="monospace" font-size="14" fill="#555">8) Determinante por Laplace:</text>
  <text x="120" y="315" font-family="monospace" font-size="13" fill="#555">det = 25(263 - 482) - 25(223 - 481) + 50(222 - 261)</text>
  <text x="120" y="345" font-family="monospace" font-size="13" fill="#555">= 25(78 - 96) - 25(66 - 48) + 50(44 - 26)</text>
  <text x="120" y="375" font-family="monospace" font-size="13" fill="#555">= 25(-18) - 2518 + 5018 = -450 - 450 + 900 = 0</text>
  <text x="100" y="460" font-family="monospace" font-size="14" fill="#555">9) Conclusão: matriz singular (det = 0)</text>
</svg>
